# ============================================
# AI 聊天平台 - 生产环境配置
# ============================================
#
# 作用：生产环境专用的配置。
#       生产环境的特点：
#         1. 使用远程数据库，密码不能明文写
#         2. 关闭 SQL 日志输出，改用 Logback 文件日志
#         3. 端口使用 80（或通过 Nginx 反向代理）
#         4. API Key 和 JWT Secret 必须从环境变量读取，不能硬编码
#
# 激活方式：java -jar ai-chat.jar --spring.profiles.active=prod
#
# 环境变量说明（部署前必须在服务器上设置）：
#   MYSQL_HOST      - 数据库主机地址（默认 localhost）
#   MYSQL_PORT      - 数据库端口（默认 3306）
#   MYSQL_DATABASE  - 数据库名（默认 ai_chat）
#   MYSQL_USERNAME  - 数据库用户名
#   MYSQL_PASSWORD  - 数据库密码
#   JWT_SECRET      - JWT 签名密钥（必须设置为复杂随机字符串）
#   DEEPSEEK_API_KEY - DeepSeek API 密钥
# ============================================

# 服务器配置
server:
  port: 8080

# Spring 配置
spring:

  # 数据源配置（生产环境使用环境变量，不硬编码密码）
  datasource:
    url: jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:3306}/${MYSQL_DATABASE:ai_chat}?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&useSSL=true&requireSSL=true
    username: ${MYSQL_USERNAME}
    password: ${MYSQL_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
    # HikariCP 连接池配置（生产环境优化）
    hikari:
      # 连接池最大连接数
      maximum-pool-size: 20
      # 连接超时时间（毫秒）
      connection-timeout: 30000
      # 空闲连接最大存活时间（毫秒）
      idle-timeout: 600000
      # 连接最大存活时间（毫秒）
      max-lifetime: 1800000

# MyBatis Plus 配置（生产环境特有）
mybatis-plus:
  configuration:
    # 生产环境关闭 SQL 日志输出，改用 Logback
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl

# JWT 配置
jwt:
  # 签名密钥（生产环境必须从环境变量读取，不能硬编码）
  secret: ${JWT_SECRET}
  # 令牌过期时间：7天（单位：毫秒）
  expiration: 604800000

# DeepSeek API 配置
deepseek:
  # DeepSeek API 密钥（生产环境必须从环境变量读取）
  api-key: ${DEEPSEEK_API_KEY}
  # DeepSeek API 地址
  api-url: https://api.deepseek.com/v1/chat/completions
  # 使用的模型名称
  model: deepseek-chat

# ============================================
# Logback 日志配置（生产环境使用文件日志）
# ============================================
logging:
  level:
    # 项目日志级别
    com.al.aichat: INFO
    # Spring 框架日志级别
    org.springframework: WARN
    # MyBatis 日志级别
    com.baomidou: WARN
  file:
    # 日志文件路径
    name: logs/ai-chat.log
  logback:
    rollingpolicy:
      # 日志文件最大大小
      max-file-size: 10MB
      # 日志文件保留天数
      max-history: 30
      # 总日志文件大小上限
      total-size-cap: 1GB
