# ============================================================
# AI 聊天平台 — Nginx Windows 本地 HTTPS 配置（自签名证书）
# ============================================================
# 证书位置: e:/develop/nginx/ssl/ai-chat.crt
# 密钥位置: e:/develop/nginx/ssl/ai-chat.key
# 测试访问: https://localhost（浏览器会警告证书不受信任，点"继续访问"即可）
# ============================================================

worker_processes 1;
events { worker_connections 1024; }

http {
    include mime.types;
    default_type application/octet-stream;
    sendfile on;
    keepalive_timeout 65;
    server_tokens off;

    gzip on;
    gzip_vary on;
    gzip_comp_level 5;
    gzip_min_length 256;
    gzip_types text/plain text/css text/javascript application/javascript application/json application/xml image/svg+xml;

    upstream backend {
        server 127.0.0.1:8080;
    }

    # ---- HTTP → HTTPS 跳转 ----
    server {
        listen 80;
        return 301 https://$host$request_uri;
    }

    # ---- HTTPS 主服务 ----
    server {
        listen 443 ssl;
        http2 on;

        # 自签名证书路径
        ssl_certificate     e:/develop/nginx/ssl/ai-chat.crt;
        ssl_certificate_key e:/develop/nginx/ssl/ai-chat.key;

        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers off;

        # HSTS（本地测试注释掉，不影响其他 localhost 项目）
        # add_header Strict-Transport-Security "max-age=63072000" always;

        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self'; connect-src 'self' https://api.deepseek.com; media-src 'none'; object-src 'none'" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "no-referrer-when-downgrade" always;

        client_max_body_size 10m;

        # API 反向代理
        location /api/ {
            proxy_pass http://backend/api/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_connect_timeout 30s;
            proxy_read_timeout 60s;

            location /api/chat/send/stream {
                proxy_pass http://backend/api/chat/send/stream;
                proxy_set_header Host $host;
                proxy_set_header X-Real-IP $remote_addr;
                proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                proxy_set_header X-Forwarded-Proto $scheme;
                proxy_buffering off;
                proxy_cache off;
                proxy_read_timeout 300s;
                proxy_http_version 1.1;
                chunked_transfer_encoding on;
            }
        }

        # 静态文件（用 expires 而非 add_header，避免覆盖安全头）
        location /assets/ {
            root e:/develop/al聊天平台/frontend/dist;
            expires 1y;
        }

        location ~* \.(svg|ico|png|jpg|woff2?)$ {
            root e:/develop/al聊天平台/frontend/dist;
            expires 30d;
        }

        # SPA
        location / {
            root e:/develop/al聊天平台/frontend/dist;
            try_files $uri $uri/ /index.html;
            location = /index.html {
                expires -1;
            }
        }
    }
}
