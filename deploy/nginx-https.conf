# ============================================================
# AI 聊天平台 — Nginx HTTPS 生产环境配置（Let's Encrypt）
# ============================================================
# 适用环境：Linux + Nginx 1.18+ + 已解析的域名
# 首次获取证书：
#   1. 确保域名 A 记录指向本服务器 IP
#   2. sudo certbot certonly --webroot -w /opt/ai-chat/frontend -d your-domain.com
#   3. 证书路径自动为: /etc/letsencrypt/live/your-domain.com/
# ============================================================

# ---- 上游后端服务 ----
upstream backend {
    server 127.0.0.1:8080;
}

# ---- HTTP 服务器（强制跳转 HTTPS）----
server {
    listen 80;
    server_name your-domain.com;

    # Let's Encrypt 验证文件（certbot webroot 模式需要）
    location /.well-known/acme-challenge/ {
        root /opt/ai-chat/frontend;
    }

    # 其他所有请求 → 301 永久重定向到 HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# ---- HTTPS 主服务器 ----
server {
    listen 443 ssl;
    http2 on;
    server_name your-domain.com;

    # ============================================================
    # SSL 证书（Let's Encrypt）
    # ============================================================
    ssl_certificate     /etc/letsencrypt/live/your-domain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/your-domain.com/privkey.pem;

    # ============================================================
    # SSL 安全配置（Mozilla Intermediate 兼容级别）
    # ============================================================
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # DH 参数（首次部署需生成：openssl dhparam -out /etc/nginx/dhparam.pem 2048）
    ssl_dhparam /etc/nginx/dhparam.pem;

    # ============================================================
    # 安全响应头
    # ============================================================
    # HSTS — 强制浏览器永远用 HTTPS 访问
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

    # CSP — 防 XSS 攻击（只允许本站资源和 DeepSeek API）
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self'; connect-src 'self' https://api.deepseek.com; media-src 'none'; object-src 'none'; frame-ancestors 'none'; base-uri 'self'" always;

    # 其他安全头
    add_header X-Content-Type-Options  "nosniff"                     always;
    add_header X-Frame-Options         "SAMEORIGIN"                  always;
    add_header X-XSS-Protection        "1; mode=block"               always;
    add_header Referrer-Policy         "no-referrer-when-downgrade"  always;
    add_header Permissions-Policy      "camera=(), microphone=(), geolocation=()" always;

    # ============================================================
    # 日志
    # ============================================================
    access_log /var/log/nginx/ai-chat-access.log;
    error_log  /var/log/nginx/ai-chat-error.log  warn;

    # Gzip
    gzip on;
    gzip_vary on;
    gzip_comp_level 5;
    gzip_min_length 256;
    gzip_types text/plain text/css text/javascript application/javascript application/json application/xml image/svg+xml font/woff2;

    client_max_body_size 10m;
    server_tokens off;

    # ============================================================
    # 第 1 部分：API 反向代理
    # ============================================================
    location /api/ {
        proxy_pass http://backend/api/;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 30s;
        proxy_read_timeout    60s;
        proxy_buffers 8 32k;
        proxy_buffer_size 64k;

        # SSE 流式聊天子路径
        location /api/chat/send/stream {
            proxy_pass http://backend/api/chat/send/stream;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_buffering off;
            proxy_cache off;
            proxy_read_timeout 300s;
            proxy_http_version 1.1;
            chunked_transfer_encoding on;
        }
    }

    # ============================================================
    # 第 2 部分：前端静态文件
    # ============================================================
    location /assets/ {
        root /opt/ai-chat/frontend;
        expires 1y;
    }

    location ~* \.(svg|ico|png|jpg|jpeg|webp|woff2?)$ {
        root /opt/ai-chat/frontend;
        expires 30d;
    }

    # ============================================================
    # 第 3 部分：SPA 路由回退
    # ============================================================
    location / {
        root /opt/ai-chat/frontend;
        try_files $uri $uri/ /index.html;
        location = /index.html {
            expires -1;
        }
    }

    # 拒绝访问隐藏文件
    location ~ /\. {
        deny all;
    }
}
