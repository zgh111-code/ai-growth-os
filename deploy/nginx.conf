# ============================================================
# AI 聊天平台 — Nginx 生产环境配置
# ============================================================
# 适用环境：Linux (Ubuntu/CentOS) + Nginx 1.18+
# 部署架构：
#   浏览器 → Nginx(:80/:443) → /api/*  → SpringBoot(:8080)
#                             → /*      → 前端静态文件(dist/)
# ============================================================

# ---- 上游后端服务定义 ----
upstream backend {
    # SpringBoot 后端地址（单机部署）
    server 127.0.0.1:8080;
    # 多实例扩展时取消注释以下行：
    # server 127.0.0.1:8081;
    # server 127.0.0.1:8082;
}

# ---- HTTP 服务器（80 端口）----
server {
    listen 80;
    # 替换为你的域名（没有域名就注释掉 server_name）
    server_name your-domain.com;

    # 日志路径（按日期滚动）
    access_log /var/log/nginx/ai-chat-access.log;
    error_log  /var/log/nginx/ai-chat-error.log  warn;

    # ---- 通用安全头 ----
    add_header X-Content-Type-Options  "nosniff"        always;
    add_header X-Frame-Options         "SAMEORIGIN"     always;
    add_header X-XSS-Protection        "1; mode=block"  always;
    add_header Referrer-Policy         "no-referrer-when-downgrade" always;

    # ---- Gzip 压缩 ----
    gzip on;
    gzip_vary on;
    gzip_comp_level 5;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml
        font/woff2;

    # ---- 上传大小限制 ----
    client_max_body_size 10m;

    # ============================================================
    # 第 1 部分：API 反向代理 → SpringBoot 后端
    # ============================================================
    location /api/ {
        # 代理到后端（保留 /api/ 前缀）
        proxy_pass http://backend/api/;

        # 请求头转发
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # ---- SSE 流式聊天支持 ----
        # 流式接口需要关闭缓冲，实时推送每个字节
        location /api/chat/send/stream {
            proxy_pass http://backend/api/chat/send/stream;

            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # 关闭代理缓冲（SSE 必须）
            proxy_buffering off;
            # 关闭缓存
            proxy_cache off;
            # 延长超时（SSE 可能持续几十秒）
            proxy_read_timeout 300s;
            # HTTP 版本 1.1（长连接）
            proxy_http_version 1.1;
            # 禁用 chunked 数据缓冲
            chunked_transfer_encoding on;
        }

        # 超时配置（普通 API 请求）
        proxy_connect_timeout 30s;
        proxy_read_timeout    60s;
        proxy_send_timeout    30s;

        # 缓冲配置
        proxy_buffers 8 32k;
        proxy_buffer_size 64k;
    }

    # ============================================================
    # 第 2 部分：前端静态文件
    # ============================================================
    # 资源文件（带 hash 版本号，可长期缓存）
    location /assets/ {
        # 替换为实际的 dist 目录路径
        root /opt/ai-chat/frontend;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # 静态素材（favicon 等）
    location ~* \.(svg|ico|png|jpg|jpeg|webp|woff2?)$ {
        root /opt/ai-chat/frontend;
        expires 30d;
        add_header Cache-Control "public";
    }

    # ============================================================
    # 第 3 部分：SPA 路由回退
    # ============================================================
    location / {
        root /opt/ai-chat/frontend;
        # SPA 核心：找不到文件时回退到 index.html
        try_files $uri $uri/ /index.html;

        # index.html 不缓存（保证版本更新后立即可见）
        location = /index.html {
            add_header Cache-Control "no-cache, no-store, must-revalidate";
        }
    }

    # ============================================================
    # 第 4 部分：安全限制
    # ============================================================
    # 隐藏 Nginx 版本号
    server_tokens off;

    # 拒绝访问隐藏文件
    location ~ /\. {
        deny all;
        access_log off;
    }
}

